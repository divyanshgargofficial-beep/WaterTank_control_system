databases:
  - name: water-tank-controller-db
    databaseName: water_tank_controller
    user: water_tank_controller
    plan: free

services:
  - type: web
    name: water-tank-cloud-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: water-tank-controller-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: DEVICE_TOKEN
        sync: false
      - key: DEFAULT_DEVICE_ID
        value: package-1
      - key: DEFAULT_DEVICE_NAME
        value: Home Water Tank
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FAMILY_EMAIL
        sync: false
      - key: FAMILY_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: "*"
